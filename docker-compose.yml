services:
  ecoeye-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoeye-app
    ports:
      - "9000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_BIND=0.0.0.0
      - APP_PORT=5000
      - APP_USERNAME=${APP_USERNAME:-admin}
      - APP_PASSWORD=${APP_PASSWORD:-changeme}
      - APP_SECRET=${APP_SECRET:-replace-with-strong-secret}
      - TOKEN_TTL_SECONDS=${TOKEN_TTL_SECONDS:-28800}
    volumes:
      - ecoeye-data:/app/data
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 0.75
    pids_limit: 200
    read_only: true
    restart: unless-stopped
    networks:
      - ecoeye-network

  # Optional: Frontend development server (commented out, use main app instead)
  # frontend-dev:
  #   build:
  #     context: ./control-app
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./control-app/src:/app/src
  #   networks:
  #     - ecoeye-network

networks:
  ecoeye-network:
    driver: bridge

volumes:
  ecoeye-data:
